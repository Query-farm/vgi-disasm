# Copyright 2026 Query Farm LLC - https://query.farm
#
# Build the `disasm-worker` binary for every supported platform and attach the
# archives (+ SHA256 + keyless cosign signature + SLSA provenance) to the GitHub
# Release for a vX.Y.Z tag. The heavy lifting lives in the shared reusable
# workflow Query-farm/vgi-actions/rust-release.yml; this file gates on the repo's
# own CI suite and supplies the worker-specific inputs.
#
# Assets are named vgi-disasm-<tag>-<duckdb_platform>.tar.gz. The executable
# inside each archive is `disasm-worker`, used directly as a DuckDB vgi LOCATION:
#   ATTACH 'vgi-disasm' AS disasm (TYPE vgi, LOCATION '/path/to/disasm-worker');
#
# Release flow:
#   1. Bump [workspace.package] version in Cargo.toml; sync Cargo.lock.
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
name: Release binaries

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: [ci]
    permissions:
      contents: write     # create Release + upload assets
      id-token: write     # keyless cosign sign-blob + provenance (sigstore OIDC)
      attestations: write # SLSA build-provenance attestation
    uses: Query-farm/vgi-actions/.github/workflows/rust-release.yml@v1
    secrets: inherit
    with:
      bin: disasm-worker
      asset_prefix: vgi-disasm
      version_check_cmd: ci/check-version.sh
