version: 2
updates:
  # Rust crate dependencies (Cargo.toml / Cargo.lock). crates.io deps (arrow,
  # capstone, goblin, object, vgi-rpc, proptest, …) are checked weekly; the
  # `arrow*` crates are grouped so they bump in lockstep.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      arrow:
        patterns:
          - "arrow*"
    commit-message:
      prefix: "deps"

  # GitHub Actions used in the workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
