# vgi-lint-check configuration for vgi-disasm.
#
# Every function this worker exposes is a pure, in-engine static transform over a
# BLOB (no network, no backend, no external state, and the input is NEVER
# executed), so the linter's execution rules (VGI9xx) CAN run the example queries
# locally against the attached worker. We therefore keep execution ENABLED and
# gate the whole suite — static metadata and executable examples alike — at
# `info`.
#
# The catalog `source_url` (-> the GitHub repo) and the per-object reference
# links (Capstone, MITRE ATT&CK), tags, titles, doc_llm/doc_md, per-arg docs, and
# example_queries are emitted from the worker's FunctionMetadata (see
# crates/disasm-worker/src/**), which the linter reads over VGI.
[tool.vgi-lint-check]
select = ["ALL"]
ignore = []
fail_on = "info"

